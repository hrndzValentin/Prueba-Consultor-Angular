<div class="container">
  <h1>🧬 Detector de Mutantes</h1>

  <p class="subtitle">
    Ingresa una secuencia de ADN (una fila por línea)
  </p>

  <textarea
    rows="8"
    [(ngModel)]="dnaInput"
    placeholder="Ejemplo:
ATGCGA
CAGTGC
TTATGT
AGAAGG
CCCCTA
TCACTG">
  </textarea>

  <button (click)="checkMutant()">
    Analizar ADN
  </button>

  <div *ngIf="result" class="result" [ngClass]="{
  'mutant': result.includes('Mutante'),
  'human': result.includes('Humano')
}">
    {{ result }}
  </div>
</div>
